name: Update Market Data

on:
  schedule:
    - cron: "*/30 0-6 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance

      - name: Ensure data directory
        run: mkdir -p data

      - name: Update market data
        run: python scripts/update_market_data.py

      - name: Commit market data if changed
        run: |
          if git diff --quiet -- data/market-data.json; then
            echo "No market data changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market-data.json
          git commit -m "Update market data"
          git push
